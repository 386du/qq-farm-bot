version: "3.8"

services:
  farm-go-service:
    build: .
    container_name: farm-go-service
    restart: unless-stopped
    ports:
      - "${PORT:-8060}:8060"
    env_file:
      - .env
    environment:
      # 容器内要访问宿主机的 Gewechat / 农场 wxlogin 服务
      # Linux: 用 host.docker.internal(需 docker 20.10+)
      # 或者把 127.0.0.1 改成宿主内网 IP
      GEWE_BASE: ${GEWE_BASE:-http://host.docker.internal:2531}
      JSLOGIN_API: ${JSLOGIN_API:-http://host.docker.internal:8059/api}
    extra_hosts:
      - "host.docker.internal:host-gateway"
